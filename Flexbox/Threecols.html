<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width" />

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
    }
  
    header {
      background: purple;
      height: 100px;
    }
  
    h1 {
      text-align: center;
      color: white;
      line-height: 100px;
      margin: 0;
    }
    h2 {
      font-size: 1.2rem;
    }
    p {
      font-size: 0.9rem;
    }
    section {
      display: flex;
      flex-flow: row wrap;
      background-color: rgb(249, 249, 183);
      gap: 10px;
    }
    article {
      padding: 10px;
      background: rgb(187, 248, 248);
      flex: 1 100px;
    }
    article:nth-of-type(3) {
      flex: 2 200px;
    }
  </style>
  <title>Flexbox - 3 columns</title>
</head>

<body>
  <header>
    <h1>Flexbox - 3 columns</h1>
  </header>
  <section>
    <article>
      <h2>First article</h2>
      <p>Content…</p>
    </article>
    <article>
      <h2>Second article</h2>
      <p>Content…</p>
    </article>
    <article>
      <h2>Third article</h2>
      <p>Content…</p>
    </article>
  </section>
</body>

</html>
