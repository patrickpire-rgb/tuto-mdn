<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width" />

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
    }
  
    div {
      display: flex;
      flex-flow: row wrap;
      align-items: center;
      justify-content: flex-start;
      height: auto;
      min-height: 100px;
      border: 1px solid black;
    }
    button {
      flex-basis: 80px;
      margin: 3px;
      font-size: 18px;
      line-height: 1.5;

      border: 1px solid navy;
      border-radius: 5px;
    }
  </style>
  <title>Flexbox - Menu</title>
</head>

<body>
  <h1>Flexbox - Menu</h1>
  <div>
    <button>Smile</button>
    <button>Laugh</button>
    <button>Wink</button>
    <button>Shrug</button>
    <button>Blush</button>
  </div>
</body>

</html>
